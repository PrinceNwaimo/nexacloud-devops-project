name: NexaCloud Deploy Pipeline
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    - name: Install dependencies
      run: npm install
    - name: Run tests
      run: npm test

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: GDPR Log Sanitisation
      run: |
        echo "Sanitising logs - removing PII fields: client_ip, session_token, user_id"
        # Add your actual log scrubbing here if you log those fields
    - name: Deploy to environment
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL_PRD }}
      run: |
        echo "Deploying to production"
        # GDPR/ICO Nov 2024: Never echo secrets or PII to logs
        kubectl apply -f k8s/
